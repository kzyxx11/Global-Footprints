name: Auto Update Travel Footprints

on:
  repository_dispatch:
    types: [ add_footprint ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    # ==================== 🎯 Core fix: Explicitly specify the Pages deployment environment ====================
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Inject New Footprint Data
        run: |
          PLACE="${{ github.event.client_payload.place }}"
          STATUS="${{ github.event.client_payload.status }}"
          DESC="${{ github.event.client_payload.description }}"
          LAT="${{ github.event.client_payload.latitude }}"
          LON="${{ github.event.client_payload.longitude }}"
          
          if [ ! -f locations.json ]; then
            echo "[]" > locations.json
          fi
          
          CURRENT_MAX_ID=$(jq 'map(.id) | max // 0' locations.json)
          NEW_ID=$((CURRENT_MAX_ID + 1))
          
          jq --argjson id "$NEW_ID" \
             --arg place "$PLACE" \
             --arg status "$STATUS" \
             --arg desc "$DESC" \
             --arg lat "$LAT" \
             --arg lon "$LON" \
             '. += [{id: $id, place: $place, status: $status, description: $desc, latitude: $lat, longitude: $lon}]' \
             locations.json > tmp.json && mv tmp.json locations.json

      - name: Commit Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add locations.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🌐 Auto-added footprint: ${{ github.event.client_payload.place }}" && git push)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install folium

      - name: Run Map Generator
        run: |
          if [ -f generate_map.py ]; then
            python generate_map.py
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
