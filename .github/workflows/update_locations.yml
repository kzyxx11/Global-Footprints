name: Auto Update Travel Footprints

on:
  repository_dispatch:
    types: [ add_footprint ]

permissions:
  contents: write # Grant permission to modify locations.json
  pages: write    # Grant permissions to directly publish web pages to GitHub Pages
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Inject New Footprint Data
        run: |
          PLACE="${{ github.event.client_payload.place }}"
          STATUS="${{ github.event.client_payload.status }}"
          DESC="${{ github.event.client_payload.description }}"
          LAT="${{ github.event.client_payload.latitude }}"
          LON="${{ github.event.client_payload.longitude }}"
          
          if [ ! -f locations.json ]; then
            echo "[]" > locations.json
          fi
          
          CURRENT_MAX_ID=$(jq 'map(.id) | max // 0' locations.json)
          NEW_ID=$((CURRENT_MAX_ID + 1))
          
          jq --argjson id "$NEW_ID" \
             --arg place "$PLACE" \
             --arg status "$STATUS" \
             --arg desc "$DESC" \
             --arg lat "$LAT" \
             --arg lon "$LON" \
             '. += [{id: $id, place: $place, status: $status, description: $desc, latitude: $lat, longitude: $lon}]' \
             locations.json > tmp.json && mv tmp.json locations.json

      - name: Commit Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add locations.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🌐 Auto-added footprint: ${{ github.event.client_payload.place }}" && git push)

      # ==================== 🛠️ Core fix: Directly render map in place. ====================
      - name: Run Map Generator
        run: |
          if [ -f generate_map.py ]; then
            python generate_map.py
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Or it could be the path to the static webpage folder you generated (keep it if it's the root directory). '.'）

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
