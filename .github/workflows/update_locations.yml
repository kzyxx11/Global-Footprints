name: Update Global Footprints Map

on:
  repository_dispatch:
    types: [add_footprint]  # 👈 Strictly correspond to the signals emitted by the Worker
permissions:
  contents: write  # 👈 Crucial! Action scripts must be granted permission to write code to your repository.
  
jobs:
  update-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas folium  # Fill in the required dependencies according to your generate_map.py file.

      - name: Inject New Footprint Data into JSON
        run: |
          python -c "
          import json
          import os

          # 1. Read the client_payload data sent by the Worker.
          payload = ${JSON_DATA}
          print('Received payload:', payload)

          json_file = 'locations.json'
          
          # 2. Read existing data
          if os.path.exists(json_file):
              with open(json_file, 'r', encoding='utf-8') as f:
                  data = json.load(f)
          else:
              data = []

          # Calculate the new auto-incrementing ID
          new_id = max([item.get('id', 0) for item in data]) + 1 if data else 1

          # 3. Construct a new footprint node containing multimedia URLs
          new_entry = {
              'id': new_id,
              'place': payload.get('place'),
              'status': payload.get('status'),
              'description': payload.get('description'),
              'latitude': float(payload.get('latitude', 0)),
              'longitude': float(payload.get('longitude', 0)),
              'date': payload.get('date'),
              'media_url': payload.get('media_url', '')
          }
          
          data.append(new_entry)

          # 4. Write back to local disk
          with open(json_file, 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          "
        env:
          # Smart capture of GitHub Core event context payload
          JSON_DATA: ${{ json(github.event.client_payload) }}

      - name: Regenerate Visual Travel Map
        run: |
          python generate_map.py  # 👈 Run your map rendering generation script

      - name: Commit and Push Changes Back to Repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Check for file changes to prevent empty commit errors.
          git add locations.json
          # If your map is exported as index.html or other map files, remember to add it here as well.
          # git add index.html 
          
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping commit."
          else
            git commit -m "🤖 Auto-updated footprint: ${{ github.event.client_payload.place }} via Bot"
            git push origin main
          fi
