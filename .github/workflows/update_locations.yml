name: Update Global Footprints Map

on:
  repository_dispatch:
    types: [add_footprint]

permissions:
  contents: write  # 👈 必须赋予脚本向你仓库 main 分支写入代码的权限

jobs:
  update-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🛡️ 安全落盘：将 Worker 传过来的 Payload 写入临时文件，彻底解决中文、符号造成的语法卡死
      - name: Save Client Payload to File
        run: |
          cat << 'EOF' > event_payload.json
          ${{ insert(github.event.client_payload) }}
          EOF
        # 注意：如果上面这行高亮报错，可以平替为：echo '${{ json(github.event.client_payload) }}' > event_payload.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 如果你的 generate_map.py 还需要 pandas 或 folium，请取消下面这行的注释
      # - name: Install Dependencies
      #   run: pip install pandas folium

      - name: Update locations.json File
        run: |
          python -c "
          import json
          import os

          # 1. 安全读取中转的 JSON 载荷
          with open('event_payload.json', 'r', encoding='utf-8') as f:
              payload = json.load(f)
          print('Loaded Payload Data:', payload)

          json_file = 'locations.json'
          
          # 2. 读取当前已有的足迹矩阵
          if os.path.exists(json_file):
              with open(json_file, 'r', encoding='utf-8') as f:
                  try:
                      data = json.load(f)
                  except:
                      data = []
          else:
              data = []

          # 计算自增主键 ID
          new_id = max([item.get('id', 0) for item in data]) + 1 if data else 1

          # 3. 完美构造新的足迹对象
          new_entry = {
              'id': new_id,
              'place': payload.get('place', 'Unknown POI'),
              'status': payload.get('status', 'Visited'),
              'description': payload.get('description', ''),
              'latitude': float(payload.get('latitude', 0.0)),
              'longitude': float(payload.get('longitude', 0.0)),
              'date': payload.get('date', ''),
              'media_url': payload.get('media_url', '')
          }
          
          data.append(new_entry)

          # 4. 漂亮地写回磁盘
          with open(json_file, 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          print('Successfully added entry!')
          "

      - name: Regenerate Visual Map Matrix
        run: |
          # 只有当你的仓库里确确实实有这个 Python 脚本时才运行它
          if [ -f "generate_map.py" ]; then
            python generate_map.py
          fi

      - name: Push Updates Back to Main Branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 把变动的文件添加进暂存区
          git add locations.json
          # 如果你的地图会输出成 index.html，也把它加进去
          if [ -f "index.html" ]; then git add index.html; fi
          
          # 智能判断，有变动才提交，防止空提交导致 Action 亮红灯
          if git diff --staged --quiet; then
            echo "No pipeline modifications detected. Standing by."
          else
            git commit -m "🤖 Realtime Map Synced: ${{ github.event.client_payload.place }} via Bot Pipeline"
            git push origin main
          fi
